<svg xmlns="http://www.w3.org/2000/svg" width="920" height="192" viewBox="0 0 920 192">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5CA9FB"/>
      <stop offset="100%" style="stop-color:#6372FF"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5CA9FB"/>
      <stop offset="100%" style="stop-color:#6372FF"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: 132x132, vertically centered (192-132)/2=30 -->
  <g transform="translate(30, 30)">
    <rect width="132" height="132" rx="28" fill="url(#grad)"/>
    <line x1="24" y1="66" x2="108" y2="66" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
    <line x1="24" y1="66" x2="42" y2="105" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
    <line x1="42" y1="105" x2="66" y2="79" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
    <line x1="66" y1="79" x2="90" y2="105" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
    <line x1="90" y1="105" x2="108" y2="66" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
    <line x1="24" y1="66" x2="66" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
    <line x1="108" y1="66" x2="66" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
    <polyline points="24,39 39,93 54,66 66,84 78,66 93,93 108,39"
              fill="none" stroke="white" stroke-width="9.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="24" cy="39" r="6.5" fill="white"/>
    <circle cx="108" cy="39" r="6.5" fill="white"/>
    <circle cx="54" cy="66" r="5.2" fill="rgba(255,255,255,0.88)"/>
    <circle cx="78" cy="66" r="5.2" fill="rgba(255,255,255,0.88)"/>
    <circle cx="66" cy="84" r="5.2" fill="rgba(255,255,255,0.88)"/>
    <circle cx="39" cy="93" r="6" fill="rgba(255,255,255,0.72)"/>
    <circle cx="93" cy="93" r="6" fill="rgba(255,255,255,0.72)"/>
  </g>

  <!-- WinnyWeb text, baseline vertically centered ~108 -->
  <text x="192" y="114"
        font-family="'Raleway','Montserrat',Arial,sans-serif"
        font-size="72" font-weight="700"
        letter-spacing="1"
        fill="white">WinnyWeb</text>

  <!-- .com — slightly smaller, same baseline -->
  <text x="658" y="114"
        font-family="'Raleway','Montserrat',Arial,sans-serif"
        font-size="46" font-weight="500"
        letter-spacing="0.5"
        fill="url(#textGrad)">.com</text>
