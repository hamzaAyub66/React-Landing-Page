<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5CA9FB"/>
      <stop offset="100%" style="stop-color:#6372FF"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#grad)"/>

  <!-- Network node lines (background) -->
  <line x1="12" y1="32" x2="52" y2="32" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="12" y1="32" x2="20" y2="50" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="20" y1="50" x2="32" y2="38" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="32" y1="38" x2="44" y2="50" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="44" y1="50" x2="52" y2="32" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="12" y1="32" x2="32" y2="15" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="52" y1="32" x2="32" y2="15" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- W letterform -->
  <polyline points="12,19 19,44 26,31 32,40 38,31 45,44 52,19"
            fill="none" stroke="white" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Node dots -->
  <circle cx="12" cy="19" r="3" fill="white"/>
  <circle cx="52" cy="19" r="3" fill="white"/>
  <circle cx="26" cy="31" r="2.4" fill="rgba(255,255,255,0.88)"/>
  <circle cx="38" cy="31" r="2.4" fill="rgba(255,255,255,0.88)"/>
  <circle cx="32" cy="40" r="2.4" fill="rgba(255,255,255,0.88)"/>
  <circle cx="19" cy="44" r="2.8" fill="rgba(255,255,255,0.72)"/>
  <circle cx="45" cy="44" r="2.8" fill="rgba(255,255,255,0.72)"/>
</svg>
