<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" role="img" aria-labelledby="title desc">
  <title id="title">WinnyWeb WhatsApp Business banner</title>
  <desc id="desc">A WhatsApp Business banner for WinnyWeb with web development, AI driven development, and workflow automation services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050A14"/>
      <stop offset="0.55" stop-color="#090B18"/>
      <stop offset="1" stop-color="#101536"/>
    </linearGradient>
    <linearGradient id="brand" x1="150" y1="238" x2="252" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5CA9FB"/>
      <stop offset="1" stop-color="#6372FF"/>
    </linearGradient>
    <linearGradient id="headline" x1="284" y1="126" x2="509" y2="173" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#5CA9FB"/>
      <stop offset="1" stop-color="#6372FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#5CA9FB" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="640" height="340" fill="url(#bg)"/>
  <path d="M418 34C501 37 572 86 612 155" fill="none" stroke="#5CA9FB" stroke-width="1.4" opacity="0.18"/>
  <path d="M386 304C250 307 122 265 38 188" fill="none" stroke="#6372FF" stroke-width="1.4" opacity="0.18"/>
  <circle cx="545" cy="80" r="4" fill="#5CA9FB" opacity="0.75"/>
  <circle cx="578" cy="138" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="80" cy="235" r="4" fill="#6372FF" opacity="0.7"/>
  <circle cx="126" cy="268" r="3" fill="#FFFFFF" opacity="0.55"/>

  <image href="winnyweb-mark.png" x="137" y="106" width="128" height="128" preserveAspectRatio="xMidYMid meet"/>

  <g>
    <text x="292" y="156" font-family="Montserrat, Raleway, Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="0">
      <tspan fill="url(#headline)">WinnyWeb</tspan><tspan fill="#FFFFFF" font-size="30" font-weight="700">.com</tspan>
    </text>
    <rect x="294" y="177" width="226" height="3" rx="1.5" fill="url(#headline)" opacity="0.95"/>
    <text x="294" y="211" fill="#FFFFFF" font-family="Open Sans, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0">
      Web Development
    </text>
    <text x="294" y="237" fill="#C8DAFF" font-family="Open Sans, Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="0">
      AI-Driven Development
    </text>
    <text x="294" y="263" fill="#C8DAFF" font-family="Open Sans, Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="0">
      Workflow Automation
    </text>
  </g>
</svg>
