<svg xmlns="http://www.w3.org/2000/svg" width="306" height="64" viewBox="0 0 306 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5CA9FB"/>
      <stop offset="100%" style="stop-color:#6372FF"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5CA9FB"/>
      <stop offset="100%" style="stop-color:#6372FF"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: 44x44, centered in 64px height = y=10 -->
  <g transform="translate(10, 10)">
    <!-- Rounded square background -->
    <rect width="44" height="44" rx="10" fill="url(#grad)"/>

    <!-- Network node motif - W shape made from connected nodes -->
    <!-- Central horizontal line -->
    <line x1="8" y1="22" x2="36" y2="22" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
    <!-- Diagonal lines forming W -->
    <line x1="8" y1="22" x2="14" y2="35" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
    <line x1="14" y1="35" x2="22" y2="26" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
    <line x1="22" y1="26" x2="30" y2="35" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
    <line x1="30" y1="35" x2="36" y2="22" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
    <!-- Top arc lines -->
    <line x1="8" y1="22" x2="22" y2="10" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
    <line x1="36" y1="22" x2="22" y2="10" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>

    <!-- W letterform - clean bold paths -->
    <polyline points="8,13 13,31 18,22 22,28 27,22 31,31 36,13"
              fill="none" stroke="white" stroke-width="3.2"
              stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Node dots -->
    <circle cx="8" cy="13" r="2.2" fill="white"/>
    <circle cx="36" cy="13" r="2.2" fill="white"/>
    <circle cx="18" cy="22" r="1.8" fill="rgba(255,255,255,0.85)"/>
    <circle cx="27" cy="22" r="1.8" fill="rgba(255,255,255,0.85)"/>
    <circle cx="22" cy="28" r="1.8" fill="rgba(255,255,255,0.85)"/>
    <circle cx="13" cy="31" r="2" fill="rgba(255,255,255,0.7)"/>
    <circle cx="31" cy="31" r="2" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- Wordmark: WinnyWeb.com -->
  <!-- "WinnyWeb" in bold white -->
  <text x="66" y="38"
        font-family="'Raleway','Montserrat',Arial,sans-serif"
        font-size="24" font-weight="700"
        letter-spacing="0.3"
        fill="white">WinnyWeb</text>

  <!-- ".com" in gradient, smaller -->
  <text x="216" y="38"
        font-family="'Raleway','Montserrat',Arial,sans-serif"
        font-size="16" font-weight="500"
        letter-spacing="0.2"
        fill="url(#textGrad)">.com</text>
</svg>
